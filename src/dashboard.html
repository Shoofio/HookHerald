<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HookHerald</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-hover: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header-stats {
    display: flex;
    gap: 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
  }
  .header-stats .value { color: var(--text); font-weight: 600; }
  .connection-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    margin-right: 6px;
    vertical-align: middle;
  }
  .connection-dot.connected { background: var(--green); }

  /* Layout */
  .main {
    display: grid;
    grid-template-columns: 340px 1fr;
    grid-template-rows: 1fr;
    height: calc(100vh - 49px);
  }

  /* Routes panel */
  .routes-panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
  }
  .routes-panel h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .route-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .route-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.up { background: var(--green); }
  .status-dot.down { background: var(--red); }
  .status-dot.unknown { background: var(--text-dim); }
  .route-slug {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .route-meta {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--mono);
    display: flex;
    gap: 12px;
  }
  .no-routes {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 24px 0;
  }

  /* Events panel */
  .events-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .events-panel h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    padding: 12px 16px 8px;
  }
  .events-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 12px;
  }
  .event-row {
    display: grid;
    grid-template-columns: 90px 1fr 80px 60px 50px;
    gap: 8px;
    align-items: center;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    border: 1px solid transparent;
  }
  .event-row:hover { background: var(--bg-hover); }
  .event-row.selected {
    background: var(--bg-hover);
    border-color: var(--border);
  }
  .event-time { color: var(--text-dim); }
  .event-slug { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .event-type {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
    text-align: center;
    font-weight: 600;
  }
  .event-type.webhook { background: #1f3a5f; color: var(--blue); }
  .event-type.register { background: #1a3a2a; color: var(--green); }
  .event-type.unregister { background: #3a1a1a; color: var(--red); }
  .badge {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
    text-align: center;
    font-weight: 600;
  }
  .badge.forwarded { background: #1a3a2a; color: var(--green); }
  .badge.no_route { background: #3a2a1a; color: var(--yellow); }
  .badge.unauthorized { background: #3a1a1a; color: var(--red); }
  .badge.invalid { background: #3a1a1a; color: var(--red); }
  .event-latency { color: var(--text-dim); text-align: right; }
  .no-events {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 48px 0;
  }

  /* Detail panel (replaces events list when active) */
  .detail-panel {
    display: none;
    flex-direction: column;
    overflow-y: auto;
    padding: 16px;
  }
  .detail-panel.visible { display: flex; }
  .detail-back {
    font-size: 13px;
    color: var(--blue);
    cursor: pointer;
    margin-bottom: 12px;
    border: none;
    background: none;
    font-family: var(--sans);
  }
  .detail-back:hover { text-decoration: underline; }
  .detail-section {
    margin-bottom: 16px;
  }
  .detail-section h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .detail-kv {
    font-family: var(--mono);
    font-size: 12px;
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 4px 12px;
  }
  .detail-kv .key { color: var(--text-dim); }
  .detail-kv .val { color: var(--text); word-break: break-all; }

  /* Trace waterfall */
  .trace-bar-container {
    margin-top: 4px;
  }
  .trace-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-family: var(--mono);
    font-size: 11px;
  }
  .trace-label {
    width: 140px;
    text-align: right;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .trace-bar-track {
    flex: 1;
    height: 16px;
    background: var(--bg);
    border-radius: 3px;
    position: relative;
  }
  .trace-bar {
    position: absolute;
    height: 100%;
    border-radius: 3px;
    background: var(--blue);
    min-width: 2px;
  }
  .trace-duration {
    width: 50px;
    color: var(--text-dim);
    font-size: 11px;
    flex-shrink: 0;
  }

  /* Payload */
  .payload-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    font-family: var(--mono);
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
  }
</style>
</head>
<body>

<div class="header">
  <h1>HookHerald</h1>
  <div class="header-stats">
    <span><span class="connection-dot" id="connDot"></span><span id="connStatus">disconnected</span></span>
    <span>uptime: <span class="value" id="uptime">-</span></span>
    <span>events: <span class="value" id="totalEvents">0</span></span>
    <span>routes: <span class="value" id="totalRoutes">0</span></span>
  </div>
</div>

<div class="main">
  <div class="routes-panel">
    <h2>Routes</h2>
    <div id="routesList"><div class="no-routes">No routes registered</div></div>
  </div>

  <div class="events-panel" id="eventsPanel">
    <h2>Event Feed</h2>
    <div class="events-list" id="eventsList">
      <div class="no-events">Waiting for events...</div>
    </div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <button class="detail-back" onclick="closeDetail()">&larr; Back to events</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const state = {
  routes: {},
  events: [],
  stats: {},
  selectedEvent: null,
};

// --- SSE ---

let es;
function connectSSE() {
  es = new EventSource('/events/stream');

  es.addEventListener('init', (e) => {
    const data = JSON.parse(e.data);
    state.routes = data.routes || {};
    state.stats = data.stats || {};
    state.events = data.recentEvents || [];
    renderAll();
  });

  es.addEventListener('event', (e) => {
    const event = JSON.parse(e.data);
    state.events.unshift(event);
    if (state.events.length > 200) state.events.length = 200;
    renderEvents();
    updateHeaderStats();
  });

  es.addEventListener('route_change', (e) => {
    const data = JSON.parse(e.data);
    state.routes = data.routes || {};
    renderRoutes();
    updateHeaderStats();
  });

  es.addEventListener('stats', (e) => {
    state.stats = JSON.parse(e.data);
    updateHeaderStats();
  });

  es.onopen = () => {
    document.getElementById('connDot').classList.add('connected');
    document.getElementById('connStatus').textContent = 'connected';
  };

  es.onerror = () => {
    document.getElementById('connDot').classList.remove('connected');
    document.getElementById('connStatus').textContent = 'reconnecting...';
  };
}

// --- Rendering ---

function renderAll() {
  renderRoutes();
  renderEvents();
  updateHeaderStats();
}

function updateHeaderStats() {
  const s = state.stats;
  document.getElementById('totalRoutes').textContent = Object.keys(state.routes).length;
  document.getElementById('totalEvents').textContent = s.webhooks ? s.webhooks.total : state.events.length;
  if (s.uptimeSeconds !== undefined) {
    document.getElementById('uptime').textContent = formatUptime(s.uptimeSeconds);
  }
}

function formatUptime(sec) {
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec / 60) + 'm ' + (sec % 60) + 's';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h + 'h ' + m + 'm';
}

function renderRoutes() {
  const el = document.getElementById('routesList');
  const slugs = Object.keys(state.routes);
  if (!slugs.length) {
    el.innerHTML = '<div class="no-routes">No routes registered</div>';
    return;
  }
  el.innerHTML = slugs.map(slug => {
    const r = state.routes[slug];
    return `<div class="route-card">
      <div class="route-header">
        <div class="status-dot ${r.status || 'unknown'}"></div>
        <div class="route-slug" title="${slug}">${slug}</div>
      </div>
      <div class="route-meta">
        <span>:${r.port}</span>
        <span>${r.eventCount || 0} events</span>
        ${r.lastEventAt ? '<span>' + timeAgo(r.lastEventAt) + '</span>' : ''}
      </div>
    </div>`;
  }).join('');
}

function renderEvents() {
  const el = document.getElementById('eventsList');
  if (!state.events.length) {
    el.innerHTML = '<div class="no-events">Waiting for events...</div>';
    return;
  }
  el.innerHTML = state.events.map(ev => {
    const time = new Date(ev.timestamp).toLocaleTimeString('en-US', { hour12: false });
    const decision = ev.routingDecision || '';
    const badgeClass = decision || '';
    return `<div class="event-row ${state.selectedEvent?.id === ev.id ? 'selected' : ''}" onclick="showDetail('${ev.id}')">
      <span class="event-time">${time}</span>
      <span class="event-slug" title="${ev.slug}">${ev.slug}</span>
      <span class="event-type ${ev.type}">${ev.type}</span>
      ${decision ? `<span class="badge ${badgeClass}">${decision.replace('_', ' ')}</span>` : '<span></span>'}
      <span class="event-latency">${ev.durationMs !== undefined ? ev.durationMs + 'ms' : ''}</span>
    </div>`;
  }).join('');
}

function showDetail(id) {
  const ev = state.events.find(e => e.id === id);
  if (!ev) return;
  state.selectedEvent = ev;

  document.getElementById('eventsPanel').style.display = 'none';
  const dp = document.getElementById('detailPanel');
  dp.classList.add('visible');

  let html = '';

  // Summary
  html += `<div class="detail-section"><h3>Summary</h3><div class="detail-kv">
    <span class="key">ID</span><span class="val">${ev.id}</span>
    <span class="key">Time</span><span class="val">${ev.timestamp}</span>
    <span class="key">Type</span><span class="val">${ev.type}</span>
    <span class="key">Slug</span><span class="val">${ev.slug}</span>
    <span class="key">Decision</span><span class="val">${ev.routingDecision || 'n/a'}</span>
    <span class="key">Response</span><span class="val">${ev.responseStatus}</span>
    <span class="key">Duration</span><span class="val">${ev.durationMs}ms</span>
    ${ev.downstreamPort ? `<span class="key">Downstream</span><span class="val">:${ev.downstreamPort} (${ev.downstreamStatus || '?'})</span>` : ''}
    ${ev.forwardDurationMs !== undefined ? `<span class="key">Forward time</span><span class="val">${ev.forwardDurationMs}ms</span>` : ''}
    ${ev.error ? `<span class="key">Error</span><span class="val" style="color:var(--red)">${esc(ev.error)}</span>` : ''}
  </div></div>`;

  // Trace waterfall
  if (ev.traceSpans && ev.traceSpans.length) {
    const maxEnd = Math.max(...ev.traceSpans.map(s => s.endMs), 1);
    html += `<div class="detail-section"><h3>Trace</h3><div class="trace-bar-container">`;
    ev.traceSpans.forEach(s => {
      const left = (s.startMs / maxEnd * 100).toFixed(1);
      const width = Math.max((s.durationMs / maxEnd * 100), 0.5).toFixed(1);
      html += `<div class="trace-row">
        <span class="trace-label">${s.name}</span>
        <div class="trace-bar-track"><div class="trace-bar" style="left:${left}%;width:${width}%"></div></div>
        <span class="trace-duration">${s.durationMs}ms</span>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Payload
  if (ev.payload) {
    html += `<div class="detail-section"><h3>Payload</h3>
      <div class="payload-block">${esc(JSON.stringify(ev.payload, null, 2))}</div></div>`;
  }

  document.getElementById('detailContent').innerHTML = html;
}

function closeDetail() {
  state.selectedEvent = null;
  document.getElementById('detailPanel').classList.remove('visible');
  document.getElementById('eventsPanel').style.display = '';
  renderEvents();
}

function timeAgo(iso) {
  const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (diff < 5) return 'just now';
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  return Math.floor(diff / 3600) + 'h ago';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Init ---
connectSSE();
</script>
</body>
</html>
