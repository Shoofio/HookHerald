name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Unit & integration tests
        run: npm test

      - name: E2E tests
        run: bash tests/e2e.sh

      - name: Docker build (verify only)
        run: docker build -t hookherald:ci-test .
